<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nirvion Labs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f1117;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    p  { color: #aaaaaa; margin-bottom: 32px; line-height: 1.6; }
    .badge {
      background: #1e2130;
      border: 1px solid #2e3250;
      border-radius: 12px;
      padding: 20px 28px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 400px;
    }
    .badge h2 { font-size: 1.1rem; margin-bottom: 4px; }
    .badge span { color: #aaaaaa; font-size: 0.85rem; }
    .links { margin-top: 32px; }
    .links a {
      color: #4a9eff;
      text-decoration: none;
      margin: 0 12px;
      font-size: 0.9rem;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <h1>Nirvion Labs</h1>
  <p>Building useful apps for students and learners.</p>

  <div class="badge">
    <h2>📚 CSQuiz</h2>
    <span>Free MCQ practice app for Computer Science students</span>
  </div>

  <div class="links">
    <a href="/privacy-policy">Privacy Policy</a>
    <a href="/terms-of-service">Terms of Service</a>
    <a href="mailto:nirvionlabs@gmail.com">Contact</a>
  </div>

</body>
</html>
